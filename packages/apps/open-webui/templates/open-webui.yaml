{{- /*
  ComputePlane mode (computePlane: true): the bundled Postgres is a private
  dependency deployed as a raw CNPG Cluster on the MANAGEMENT cluster, hidden
  from the user; the DB password is generated once (lookup existing -> reuse,
  else randAlphaNum) and passed into the workload as a value (the remote pod
  cannot read a management Secret). The Qdrant vector DB stays on management
  too (its operator lives there); its operator-generated API key is read by
  lookup and passed as a value — it populates on the next reconcile once
  Qdrant has created the key secret.
*/}}
{{- $db := printf "postgres-%s-db" .Release.Name }}
{{- $secret := printf "%s-app" $db }}
{{- $pw := "" }}
{{- $qdrantKey := "" }}
{{- if .Values.computePlane }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secret }}
{{- $pw = .Values.database.password }}
{{- if not $pw }}
  {{- if and $existing $existing.data (hasKey $existing.data "password") }}
    {{- $pw = index $existing.data "password" | b64dec }}
  {{- else }}
    {{- $pw = randAlphaNum 24 }}
  {{- end }}
{{- end }}
{{- if .Values.qdrant.enabled }}
  {{- $qs := lookup "v1" "Secret" .Release.Namespace (printf "qdrant-%s-vector-apikey" .Release.Name) }}
  {{- if and $qs $qs.data (hasKey $qs.data "api-key") }}
    {{- $qdrantKey = index $qs.data "api-key" | b64dec }}
  {{- end }}
{{- end }}
---
# Bundled Postgres credentials (management). Generated by the chart, hidden from the user.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret }}
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.database.user | quote }}
  password: {{ $pw | quote }}
---
# Bundled raw CNPG Postgres (management) — private dependency, not a first-class app.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $db }}
  namespace: {{ .Release.Namespace }}
spec:
  instances: {{ .Values.database.replicas }}
  imageName: ghcr.io/cloudnative-pg/postgresql:17.7-standard-trixie
  storage:
    size: {{ .Values.database.size }}
    {{- with .Values.storageClass }}
    storageClass: {{ . }}
    {{- end }}
  bootstrap:
    initdb:
      database: {{ .Values.database.name }}
      owner: {{ .Values.database.user }}
      secret:
        name: {{ $secret }}
  inheritedMetadata:
    labels:
      policy.cozystack.io/allow-to-apiserver: "true"
{{- end }}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  # cozystack already creates an outer HelmRelease named `{{ .Release.Name }}` from
  # the ApplicationDefinition; the wrapping HelmRelease we render here must have a
  # different name to avoid the "patch a resource with different ownership" failure.
  name: {{ .Release.Name }}-app
spec:
  interval: 5m
  {{- if .Values.computePlane }}
  # Only the workload is routed onto the tenant's ComputePlane; the bundled
  # Postgres (above) and the optional Qdrant stay on the management cluster and
  # are reached by DNS through the ComputePlane pods' *.svc search domain.
  kubeConfig:
    secretRef:
      name: computeplane-cluster-admin-kubeconfig
      key: super-admin.svc
  # The tenant namespace does not exist on the ComputePlane; create it there and
  # store the Helm release in it (createNamespace alone is a no-op without an
  # explicit targetNamespace on the remote cluster).
  targetNamespace: {{ .Release.Namespace }}
  storageNamespace: {{ .Release.Namespace }}
  install:
    createNamespace: true
  {{- end }}
  chart:
    spec:
      chart: open-webui
      # renovate: datasource=helm depName=open-webui registryUrl=https://helm.openwebui.com/
      version: 14.8.0
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: external-open-webui
  {{- if .Values.computePlane }}
  {{- if .Values.qdrant.enabled }}
  # The bundled Postgres is a raw CNPG Cluster (not a HelmRelease) in this mode,
  # so it is not a dependsOn target; Qdrant is still a managed app HelmRelease
  # on management.
  dependsOn:
    - name: qdrant-{{ .Release.Name }}-vector
      namespace: {{ .Release.Namespace }}
  {{- end }}
  {{- else }}
  dependsOn:
    - name: postgres-{{ .Release.Name }}-db
      namespace: {{ .Release.Namespace }}
    {{- if .Values.qdrant.enabled }}
    - name: qdrant-{{ .Release.Name }}-vector
      namespace: {{ .Release.Namespace }}
    {{- end }}
  {{- end }}
  values:
    # Pin the Service name deterministically. The upstream fullname helper
    # collapses to the release name when it already contains "open-webui"
    # (e.g. a CR named `open-webui` → release `open-webui-app` → Service
    # `open-webui-app`, not `...-open-webui`). The gatekeeper upstream below
    # targets this exact name, so it must not depend on that heuristic.
    fullnameOverride: {{ .Release.Name }}-webui
    # Bundled Ollama subchart is disabled — model serving comes from vLLM via LiteLLM.
    ollama:
      enabled: false
    {{- if and .Values.resources (or .Values.resources.cpu .Values.resources.memory) }}
    resources:
      requests:
        {{- with .Values.resources.cpu }}
        cpu: {{ . | quote }}
        {{- end }}
        {{- with .Values.resources.memory }}
        memory: {{ . | quote }}
        {{- end }}
      limits:
        {{- with .Values.resources.cpu }}
        cpu: {{ . | quote }}
        {{- end }}
        {{- with .Values.resources.memory }}
        memory: {{ . | quote }}
        {{- end }}
    {{- end }}
    {{- with .Values.openaiBaseApiUrl }}
    openaiBaseApiUrl: {{ . | quote }}
    {{- end }}
    {{- with .Values.openaiApiKey }}
    openaiApiKey: {{ . | quote }}
    {{- end }}
    # Per-field DATABASE_* env wiring (Open WebUI assembles the URL internally
    # when DATABASE_URL is empty and each DATABASE_* var is set).
    extraEnvVars:
      - name: DATABASE_TYPE
        value: postgres
      - name: DATABASE_HOST
        value: postgres-{{ .Release.Name }}-db-rw
      - name: DATABASE_PORT
        value: "5432"
      - name: DATABASE_USER
        value: {{ .Values.database.user | quote }}
      - name: DATABASE_NAME
        value: {{ .Values.database.name | quote }}
      {{- if .Values.computePlane }}
      # Same generated password as the management Postgres, passed as a value
      # (the workload pod on the ComputePlane cannot read a management Secret).
      - name: DATABASE_PASSWORD
        value: {{ $pw | quote }}
      {{- else }}
      - name: DATABASE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: postgres-{{ .Release.Name }}-db-credentials
            key: {{ .Values.database.user }}
      {{- end }}
      {{- if .Values.qdrant.enabled }}
      # RAG vector store wired to a cozystack-managed Qdrant.
      - name: VECTOR_DB
        value: qdrant
      - name: QDRANT_URI
        value: "http://qdrant-{{ .Release.Name }}-vector:6333"
      {{- if .Values.computePlane }}
      # Qdrant API key from the management Qdrant, passed as a value (populates
      # on the next reconcile once the Qdrant operator has created the secret).
      - name: QDRANT_API_KEY
        value: {{ $qdrantKey | quote }}
      {{- else }}
      - name: QDRANT_API_KEY
        valueFrom:
          secretKeyRef:
            name: qdrant-{{ .Release.Name }}-vector-apikey
            key: api-key
      {{- end }}
      {{- end }}
      {{- if and .Values.host (eq (printf "%v" (index (.Values._cluster | default dict) "oidc-enabled" | default "false")) "true") }}
      # Behind the OIDC gatekeeper (templates/gatekeeper.yaml): trust the
      # identity headers oauth2-proxy injects so users are signed in via the
      # platform SSO instead of a second Open WebUI login.
      - name: WEBUI_URL
        value: "https://{{ .Values.host }}"
      - name: WEBUI_AUTH_TRUSTED_EMAIL_HEADER
        value: "X-Forwarded-Email"
      - name: WEBUI_AUTH_TRUSTED_NAME_HEADER
        value: "X-Forwarded-Preferred-Username"
      {{- end }}
    # Exposure (Ingress) is handled by the OIDC gatekeeper, never by the
    # upstream chart — see templates/gatekeeper.yaml. Without OIDC the UI is
    # reachable only via `kubectl port-forward`.
