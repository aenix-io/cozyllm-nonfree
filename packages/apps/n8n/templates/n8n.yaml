{{- /*
  ComputePlane mode (computePlane: true): the bundled Postgres is a private
  dependency deployed as a raw CNPG Cluster on the MANAGEMENT cluster, hidden
  from the user. Only the untrusted-code n8n workload is routed onto the
  tenant's ComputePlane. The workload reaches the management Postgres by DNS —
  postgres-<release>-db-rw resolves through the ComputePlane pods' *.svc search
  domain back to the tenant namespace on management.

  The DB password is never the user's concern: the chart generates it (look up
  the existing credentials Secret -> reuse, else randAlphaNum) so it survives
  reconciles, and writes the SAME value into the CNPG bootstrap secret on
  management AND into the workload values on the ComputePlane. n8n encrypts
  stored credentials with the encryption key, which must stay STABLE across pod
  restarts or n8n crashes with a key mismatch against the data already in
  Postgres — it is generated and preserved the same way.
*/}}
{{- $db := printf "postgres-%s-db" .Release.Name }}
{{- $secret := printf "%s-app" $db }}
{{- $pw := "" }}
{{- $encKey := "" }}
{{- $licKey := "" }}
{{- if .Values.computePlane }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secret }}
{{- $data := dict }}
{{- if and $existing $existing.data }}{{ $data = $existing.data }}{{ end }}
{{- $pw = .Values.database.password }}
{{- if not $pw }}
  {{- if hasKey $data "password" }}{{ $pw = index $data "password" | b64dec }}{{ else }}{{ $pw = randAlphaNum 24 }}{{ end }}
{{- end }}
{{- $encKey = .Values.encryptionKey }}
{{- if not $encKey }}
  {{- if hasKey $data "encryption-key" }}{{ $encKey = index $data "encryption-key" | b64dec }}{{ else }}{{ $encKey = randAlphaNum 48 }}{{ end }}
{{- end }}
{{- with .Values.vendorLicense }}
{{- with .secretRef }}
{{- $ls := lookup "v1" "Secret" $.Release.Namespace . }}
{{- if and $ls $ls.data (hasKey $ls.data "N8N_LICENSE_ACTIVATION_KEY") }}
{{- $licKey = index $ls.data "N8N_LICENSE_ACTIVATION_KEY" | b64dec }}
{{- end }}
{{- end }}
{{- end }}
---
# Bundled Postgres credentials (management). Generated by the chart, hidden from the user.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret }}
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.database.user | quote }}
  password: {{ $pw | quote }}
  encryption-key: {{ $encKey | quote }}
---
# Bundled raw CNPG Postgres (management) — private dependency, not a first-class app.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $db }}
  namespace: {{ .Release.Namespace }}
spec:
  instances: {{ .Values.database.replicas }}
  imageName: ghcr.io/cloudnative-pg/postgresql:17.7-standard-trixie
  storage:
    size: {{ .Values.database.size }}
    {{- with .Values.storageClass }}
    storageClass: {{ . }}
    {{- end }}
  bootstrap:
    initdb:
      database: {{ .Values.database.name }}
      owner: {{ .Values.database.user }}
      secret:
        name: {{ $secret }}
  inheritedMetadata:
    labels:
      policy.cozystack.io/allow-to-apiserver: "true"
{{- end }}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  # cozystack already creates an outer HelmRelease named `{{ .Release.Name }}` from
  # the ApplicationDefinition; the wrapping HelmRelease we render here must have a
  # different name to avoid the "patch a resource with different ownership" failure.
  name: {{ .Release.Name }}-app
spec:
  interval: 5m
  {{- if .Values.computePlane }}
  kubeConfig:
    secretRef:
      name: computeplane-cluster-admin-kubeconfig
      key: super-admin.svc
  # The tenant namespace does not exist on the ComputePlane; create it there and
  # store the Helm release in it (createNamespace alone is a no-op without an
  # explicit targetNamespace on the remote cluster).
  targetNamespace: {{ .Release.Namespace }}
  storageNamespace: {{ .Release.Namespace }}
  install:
    createNamespace: true
  {{- end }}
  chart:
    spec:
      chart: n8n
      # renovate: datasource=docker depName=8gears.container-registry.com/library/n8n
      version: 2.0.1
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: external-n8n
  {{- if not .Values.computePlane }}
  dependsOn:
    - name: postgres-{{ .Release.Name }}-db
      namespace: {{ .Release.Namespace }}
  {{- end }}
  values:
    # Bundled Valkey is disabled — single-process mode without queue workers.
    # Switch to queue mode and add a Pattern C Redis sibling CR when horizontal worker scaling is needed.
    valkey:
      enabled: false
    main:
      {{- if and .Values.resources (or .Values.resources.cpu .Values.resources.memory) }}
      resources:
        requests:
          {{- with .Values.resources.cpu }}
          cpu: {{ . | quote }}
          {{- end }}
          {{- with .Values.resources.memory }}
          memory: {{ . | quote }}
          {{- end }}
        limits:
          {{- with .Values.resources.cpu }}
          cpu: {{ . | quote }}
          {{- end }}
          {{- with .Values.resources.memory }}
          memory: {{ . | quote }}
          {{- end }}
      {{- end }}
      {{- if .Values.computePlane }}
      # n8n runs DB migrations on first boot, which can exceed the chart's default
      # zero-delay liveness grace and cause a restart loop; give it headroom so it
      # is not killed mid-migration (validated live on a ComputePlane).
      livenessProbe:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 90
        periodSeconds: 10
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 20
        periodSeconds: 10
        failureThreshold: 6
      {{- end }}
      config:
        db:
          type: postgresdb
          postgresdb:
            host: postgres-{{ .Release.Name }}-db-rw
            port: 5432
            database: {{ .Values.database.name }}
            user: {{ .Values.database.user }}
      extraEnv:
        DB_POSTGRESDB_PASSWORD:
          {{- if .Values.computePlane }}
          # Same generated password as the management Postgres, passed as a value
          # (the workload pod on the ComputePlane cannot read a management Secret).
          value: {{ $pw | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: postgres-{{ .Release.Name }}-db-credentials
              key: {{ .Values.database.user }}
          {{- end }}
        {{- if .Values.host }}
        # Behind the TLS Ingress: n8n needs its public URL so generated
        # webhook/editor links and OAuth callbacks are correct.
        # The n8n chart renders each extraEnv value via `toYaml`, so every entry
        # must be a full env-var spec (a map with `value:`/`valueFrom:`), not a
        # bare string.
        N8N_HOST:
          value: {{ .Values.host | quote }}
        N8N_PROTOCOL:
          value: "https"
        N8N_SECURE_COOKIE:
          value: "true"
        WEBHOOK_URL:
          value: {{ printf "https://%s/" .Values.host | quote }}
        {{- end }}
        {{- with .Values.vendorLicense }}
        {{- with .secretRef }}
        # BYOL: the operator's own n8n activation key (Embed/Enterprise
        # entitlement), read from a pre-created Secret in this namespace.
        N8N_LICENSE_ACTIVATION_KEY:
          {{- if $.Values.computePlane }}
          # The workload on the ComputePlane cannot read a management Secret; the
          # management helm-controller reads the key via lookup and passes it as a
          # value (populates on the next reconcile if the Secret appears later).
          value: {{ $licKey | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ . | quote }}
              key: N8N_LICENSE_ACTIVATION_KEY
          {{- end }}
        {{- end }}
        {{- end }}
      {{- if .Values.computePlane }}
      secret:
        n8n:
          encryption_key: {{ $encKey | quote }}
      {{- else }}
      {{- with .Values.encryptionKey }}
      secret:
        n8n:
          encryption_key: {{ . | quote }}
      {{- end }}
      {{- end }}
    {{- if .Values.host }}
    {{- $cluster := .Values._cluster | default dict }}
    {{- $solver := index $cluster "solver" | default "http01" }}
    {{- $clusterIssuer := index $cluster "issuer-name" | default "letsencrypt-prod" }}
    {{- $ingressClass := index $cluster "expose-ingress" | default "tenant-root" }}
    {{- if .Values.computePlane }}
    {{- /* the ComputePlane's own ingress-nginx (the pinned addon's IngressClass),
           exposed back to the tenant entry point via the per-app management
           Ingress below */}}
    {{- $ingressClass = "nginx" }}
    {{- end }}
    ingress:
      enabled: true
      className: {{ $ingressClass }}
      annotations:
        cert-manager.io/cluster-issuer: {{ $clusterIssuer }}
        {{- if eq $solver "http01" }}
        acme.cert-manager.io/http01-ingress-ingressclassname: {{ $ingressClass }}
        {{- end }}
      hosts:
        - host: {{ .Values.host | quote }}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - {{ .Values.host | quote }}
          secretName: {{ .Release.Name }}-n8n-tls
    {{- end }}
{{- if and .Values.computePlane .Values.host }}
{{- $ingressClass := index (.Values._cluster | default dict) "expose-ingress" | default "tenant-root" }}
---
# Per-app exposure: a management Ingress proxies the app's host to the
# ComputePlane's ingress-nginx (the computeplane-cluster-ingress-nginx Service
# selects the ComputePlane nodes, ssl-passthrough). No management LoadBalancer
# is allocated; the app is reachable through the tenant's normal entry point.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-computeplane
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
spec:
  ingressClassName: {{ $ingressClass }}
  rules:
    - host: {{ .Values.host | quote }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: computeplane-cluster-ingress-nginx
                port:
                  number: 443
{{- end }}
